services:
  # 前端 Nginx（内置前端构建产物）
  web:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # 后端 API
  api:
    build: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_temp:/tmp/bilihelper
    restart: unless-stopped

  # 异步任务 Worker（字幕/ASR/LLM）
  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_temp:/tmp/bilihelper
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        docker-entrypoint.sh celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  # 数据库
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bilihelper
      POSTGRES_USER: bilihelper
      POSTGRES_PASSWORD: bilihelper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilihelper"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # 消息队列
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_temp:
